name: update-agent-package-advisories

on:
  schedule:
    # Keep the built-in offline DB fresh after the AUDR CVE ledger cron runs.
    - cron: '30 16 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true
          cache: true

      - name: refresh generated advisory database
        run: |
          python3 scripts/update-agent-package-advisories.py
          python3 scripts/generate-agent-package-advisories.py
          gofmt -w internal/rules/builtin/dependencies_db_generated.go
          go test ./internal/parse ./internal/rules/builtin

      - name: open pull request when database changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- internal/rules/builtin/advisories/agent-packages.json internal/rules/builtin/dependencies_db_generated.go; then
            echo "agent package advisory DB already current"
            exit 0
          fi
          branch="automation/update-agent-package-advisories"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add internal/rules/builtin/advisories/agent-packages.json internal/rules/builtin/dependencies_db_generated.go
          git commit -m "data(advisories): refresh agent package vulnerability database"
          git push --force-with-lease origin "$branch"
          gh pr view "$branch" >/dev/null 2>&1 || gh pr create \
            --head "$branch" \
            --base main \
            --title "data(advisories): refresh agent package vulnerability database" \
            --body "Automated refresh of the offline AI-agent/MCP package vulnerability database from the reviewed AUDR CVE ledger.\n\nVerification run by workflow:\n- python3 scripts/update-agent-package-advisories.py\n- python3 scripts/generate-agent-package-advisories.py\n- go test ./internal/parse ./internal/rules/builtin"
