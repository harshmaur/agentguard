name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          check-latest: true
          cache: true

      - name: vet
        run: go vet ./...

      - name: test (race detector)
        run: go test -race -count=1 ./...

      - name: build
        run: go build -v ./cmd/audr

      - name: smoke scan (dirty fixture — exit 1 expected with findings)
        run: |
          ./audr version
          # Dirty fixture has critical/high findings, so the scanner exits 1.
          # That IS the behavior we want for CI integration. Capture the
          # non-zero exit, then assert on the report content.
          set +e
          ./audr scan -f sarif testdata/laptops/dirty > /tmp/scan.sarif
          dirty_exit_sarif=$?
          ./audr scan -f json testdata/laptops/dirty > /tmp/scan.json
          dirty_exit_json=$?
          ./audr scan -f html -o /tmp/scan.html testdata/laptops/dirty
          dirty_exit_html=$?
          set -e
          # Each scan must exit 1 (findings present).
          test "$dirty_exit_sarif" -eq 1 || { echo "expected exit 1 from sarif scan, got $dirty_exit_sarif"; exit 1; }
          test "$dirty_exit_json"  -eq 1 || { echo "expected exit 1 from json scan, got $dirty_exit_json"; exit 1; }
          test "$dirty_exit_html"  -eq 1 || { echo "expected exit 1 from html scan, got $dirty_exit_html"; exit 1; }
          # And the dirty fixture must produce >= 8 findings.
          jq '.stats.total' /tmp/scan.json
          test "$(jq '.stats.total' /tmp/scan.json)" -ge 8

      - name: clean fixture must have zero findings (exit 0)
        run: |
          ./audr scan -f json testdata/laptops/clean > /tmp/clean.json
          test "$(jq '.stats.total' /tmp/clean.json)" -eq 0

      - name: self-scan — repo source must have zero findings
        # Dogfood gate. Scans the repo with .audrignore (which
        # excludes testdata/ — intentional fixtures). Anything that fires
        # here is a real credential or risky config landed in source.
        # See AGENTS.md for the placeholder convention test fixtures use.
        run: |
          ./audr scan -f json -o /tmp/self-scan.json .
          findings=$(jq '.stats.total' /tmp/self-scan.json)
          if [ "$findings" -ne 0 ]; then
            echo "::error::audr self-scan found $findings issues in source — see /tmp/self-scan.json"
            jq '.findings[] | "\(.severity) \(.rule_id) \(.path):\(.line)"' /tmp/self-scan.json
            exit 1
          fi

      - name: sarif must validate as JSON
        run: jq . /tmp/scan.sarif > /dev/null

      - name: docs/sample-report.html must be in sync with the template + fixture
        # Regenerate the sample report from the current template + dirty
        # fixture. Diff against the committed copy after stripping the
        # non-deterministic timestamp and duration values. PR fails if the
        # committed sample is structurally stale — guards against template
        # or fixture changes that forget to regenerate the doc artifact.
        run: |
          ./audr scan -f html -o /tmp/sample-report.fresh.html testdata/laptops/dirty || true
          # Strip runtime-only values and line-end whitespace. The started
          # timestamp and scan duration legitimately vary across developer
          # machines and GitHub runners; template indentation can also leave
          # harmless trailing spaces on generated blank/control lines.
          normalize_report() {
            sed -E \
              -e 's@<span class="v">[0-9-]+ [0-9:]+ [A-Z]+</span>@<span class="v">[normalized]</span>@g' \
              -e 's@<span class="v">[0-9]+(ms|µs|ns|s)</span>@<span class="v">[duration]</span>@g' \
              "$1" | sed -E 's/[[:space:]]+$//'
          }
          if ! diff -q \
              <(normalize_report /tmp/sample-report.fresh.html) \
              <(normalize_report docs/sample-report.html) > /dev/null; then
            echo "::error::docs/sample-report.html is structurally stale. Regenerate with:"
            echo "  ./audr scan -f html -o docs/sample-report.html testdata/laptops/dirty"
            diff \
              <(normalize_report /tmp/sample-report.fresh.html) \
              <(normalize_report docs/sample-report.html) | head -40 || true
            exit 1
          fi

  # test-windows verifies the Windows-tagged code actually compiles
  # AND its tests pass on a real Windows host. The Linux test job
  # already cross-compiles ./... for windows/amd64 implicitly via
  # go test -count=1 ./..., but cross-compiling proves only "imports
  # resolve" — it doesn't run test bodies. This job:
  #
  #   - exercises TestRunnerWindowsLowPriority (skipped on Linux)
  #   - runs the schtasks XML composer + status parser unit tests
  #     under the windows build tag
  #   - confirms the PowerShell toaster fallback compiles + runs in
  #     beeep mode without a windows toaster (lane A continuation
  #     deferred per Codex review)
  #
  # No integration shell scripts here — windows-latest runners don't
  # ship jq + sed + a deterministic diff. That coverage stays on the
  # ubuntu job.
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          check-latest: true
          cache: true

      - name: vet
        run: go vet ./...

      - name: test (windows-safe unit subset)
        # Linux and macOS run the full package suite. On Windows, many older
        # tests intentionally use POSIX fixture paths, chmod semantics, or
        # Unix file-lock assumptions, so keep this lane focused on packages
        # that exercise Windows-specific code and are portable on hosted
        # windows-latest runners; the build/smoke steps below still compile
        # the full Windows binary.
        run: go test -count=1 ./internal/lowprio ./internal/ospkg ./internal/runtimeenv ./internal/selfaudit ./internal/updater ./internal/verify

      - name: build
        run: go build -v ./cmd/audr

      - name: smoke — audr version + self-audit
        shell: pwsh
        run: |
          ./audr.exe version
          ./audr.exe self-audit --json | Out-Null

      - name: smoke — clean fixture must have zero findings
        shell: pwsh
        run: |
          ./audr.exe scan -f json testdata/laptops/clean | Set-Content scan-clean.json
          $count = (Get-Content scan-clean.json | ConvertFrom-Json).stats.total
          if ($count -ne 0) {
            Write-Error "expected 0 findings on clean fixture, got $count"
            exit 1
          }

  # test-macos covers the Darwin-tagged code (darwinToaster +
  # terminal-notifier probe + osascript fallback + the macOS preflight
  # diagnostics). Compile-only on Linux only proves imports — actually
  # running the tests on macos-latest catches platform regressions
  # like the v0.5.4 PATH-augment bug.
  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          check-latest: true
          cache: true

      - name: vet
        run: go vet ./...

      - name: test (race detector, unit only)
        run: go test -race -count=1 ./...

      - name: build
        run: go build -v ./cmd/audr

      - name: smoke — audr version + self-audit
        run: |
          ./audr version
          ./audr self-audit --json > /dev/null

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      # Short fuzz run on parsers — catches crashes table-driven tests miss.
      # Promoted into v1 per /plan-eng-review.
      - name: fuzz parsers (short)
        run: |
          go test -fuzz=. -fuzztime=20s ./internal/parse/ || true
