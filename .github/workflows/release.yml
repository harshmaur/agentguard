name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write       # create release + upload artifacts
  id-token: write       # cosign keyless OIDC
  attestations: write   # SLSA L2 build provenance attestation
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true

      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: install syft (for SBOM)
        uses: anchore/sbom-action/download-syft@v0

      - name: cross-compile binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          # macOS + Linux artifacts → .tar.gz (Unix tradition; install.sh
          # extracts them).
          for os_arch in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64; do
            os="${os_arch%/*}"
            arch="${os_arch#*/}"
            out_dir="dist/audr-${VERSION}-${os}-${arch}"
            mkdir -p "$out_dir"
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 \
              go build \
                -trimpath \
                -buildvcs=false \
                -ldflags="-s -w -X main.Version=${VERSION}" \
                -o "$out_dir/audr" ./cmd/audr
            cp README.md TODOS.md install.sh "$out_dir/" || true
            (cd dist && tar -czf "audr-${VERSION}-${os}-${arch}.tar.gz" "audr-${VERSION}-${os}-${arch}")
            rm -rf "$out_dir"
          done
          # Windows artifacts → .zip. The install.ps1 helper consumes
          # this format. Including install.ps1 inside the zip too so
          # offline installs work after the user downloads a single
          # artifact.
          for arch in amd64 arm64; do
            out_dir="dist/audr-${VERSION}-windows-${arch}"
            mkdir -p "$out_dir"
            GOOS=windows GOARCH=$arch CGO_ENABLED=0 \
              go build \
                -trimpath \
                -buildvcs=false \
                -ldflags="-s -w -X main.Version=${VERSION}" \
                -o "$out_dir/audr.exe" ./cmd/audr
            cp README.md TODOS.md install.ps1 "$out_dir/" || true
            (cd dist && zip -qr "audr-${VERSION}-windows-${arch}.zip" "audr-${VERSION}-windows-${arch}")
            rm -rf "$out_dir"
          done
          (cd dist && sha256sum *.tar.gz *.zip > SHA256SUMS)
          cat dist/SHA256SUMS

      - name: generate SBOM
        run: |
          syft scan dir:. -o spdx-json=dist/audr.sbom.spdx.json
          syft scan dir:. -o cyclonedx-json=dist/audr.sbom.cyclonedx.json

      - name: cosign sign release artifacts (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cd dist
          for f in *.tar.gz *.zip SHA256SUMS *.sbom.*.json; do
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.crt" \
              "$f"
          done

      # SLSA L2 build provenance via actions/attest-build-provenance.
      # Repo is public as of v0.2.4 — attestations persist to GitHub API,
      # SLSA L2 ships hard (release fails if attestation cannot be written).
      - name: SLSA L2 build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sig
            dist/*.tar.gz.crt
            dist/*.zip
            dist/*.zip.sig
            dist/*.zip.crt
            dist/SHA256SUMS
            dist/SHA256SUMS.sig
            dist/SHA256SUMS.crt
            dist/*.sbom.*.json
            dist/*.sbom.*.json.sig
            dist/*.sbom.*.json.crt
          generate_release_notes: true
